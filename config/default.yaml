# Sentinel default configuration.
# Override by (a) editing this file, (b) setting env vars (see .env.example),
# or (c) passing --config path/to/other.yaml on the CLI.

ingestion:
  market:
    default_start: "2015-01-01"
    default_interval: "1d"      # 1d, 1h, etc. (yfinance valid intervals)
  reddit:
    subreddits:
      - wallstreetbets
      - stocks
      - investing
    max_posts_per_run: 500
  twitter:
    max_tweets_per_run: 500
  crypto:
    default_start: "2020-01-01"
    default_interval: "1d"            # CCXT timeframe: 1d, 1h, 5m, ...
    default_exchange: "binance"       # any ccxt exchange id (coinbase, kraken, ...)
    default_quote: "USDT"             # exchange-side quote; stored as "-USD" key

features:
  returns:
    windows: [1, 5, 10, 20]
  moving_averages:
    sma_windows: [5, 10, 20, 50, 200]
    ema_windows: [12, 26]
  volatility:
    windows: [5, 10, 20]
  momentum:
    windows: [5, 10, 20]
  volume:
    windows: [5, 20]

targets:
  # Direction target: sign of return over the next `horizon` days
  horizon_days: 1
  # Regression target uses the same horizon

modeling:
  default_model: "logistic"    # logistic | random_forest
  random_state: 42
  test_fraction: 0.2           # final held-out tail
  walk_forward:
    n_splits: 5
    min_train_size: 252        # ~1 trading year

# ---------------------------------------------------------------------------
# Recurring ingestion / feature jobs, executed by `sentinel schedule run`.
#
# Each job has:
#   name     : unique identifier, used for logs and filtering
#   kind     : one of ingest-prices | ingest-reddit | ingest-twitter |
#              ingest-crypto | score-sentiment | build-features
#              (see sentinel.scheduling.registry)
#   interval : "30s", "15m", "1h", "1d", or a bare number of seconds
#   params   : forwarded as **kwargs to the job function
#   enabled  : optional, defaults to true
#
# Uncomment and adapt to your tickers. Run once on demand:
#     sentinel schedule run --once
# Or as a daemon:
#     sentinel schedule run --forever
# ---------------------------------------------------------------------------
