name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -q

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # Ignore DL3008 (pin apt versions) — we pin Python + Debian base image
          # instead, which is sufficient for a dev/demo image.
          ignore: DL3008

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: sentinel:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image
        run: |
          docker run --rm sentinel:ci version
          docker run --rm sentinel:ci --help > /dev/null

  compose:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate default profile
        run: docker compose config --quiet

      - name: Validate postgres profile
        run: docker compose --profile postgres config --quiet

      - name: Validate mlflow profile
        run: docker compose --profile mlflow config --quiet
